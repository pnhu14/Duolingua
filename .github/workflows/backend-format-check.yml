name: Backend Format Check

on:
  pull_request:
    paths:
      - "backend/music/**"
      - ".github/workflows/backend-format-check.yml"

permissions:
  contents: read

jobs:
  spotless-check:
    name: Spotless Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/music

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Verify backend formatting
        run: ./mvnw spotless:check
