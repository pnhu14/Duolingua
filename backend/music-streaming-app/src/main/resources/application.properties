# ===================================
# PostgreSQL Configuration (Laragon)
# ===================================
# Load local development secrets from backend/music/.env when present.
spring.config.import=optional:file:./.env[.properties]

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:music_db}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
# Keep Hibernate from managing schema changes directly.
# Future schema evolution should be handled by versioned Flyway migrations.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Disable Spring SQL bootstrap to keep startup independent from schema/data scripts.
# Database setup will be managed via migrations in a later step.
spring.sql.init.mode=never

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=2
spring.flyway.baseline-description=Existing schema and seed data

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
